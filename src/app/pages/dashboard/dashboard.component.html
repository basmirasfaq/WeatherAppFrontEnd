<div class="flex bg-slate-950 min-h-screen">

  <!-- SIDEBAR -->
  <app-sidebar></app-sidebar>

  <!-- MAIN CONTENT -->
  <div class="ml-64 w-full p-6">

    <!-- NAVBAR -->
    <app-navbar
      (citySearch)="getWeather($event)">
    </app-navbar>

    <!-- WEATHER CARDS -->
    <div
      *ngIf="weatherData"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-8">

      <!-- TEMPERATURE -->
      <div
        class="bg-slate-900 p-6 rounded-2xl text-white shadow-lg">

        <h3 class="text-gray-400 text-lg">
          Temperature
        </h3>

        <p class="text-4xl font-bold mt-4">
          {{ weatherData.temperature }}°C
        </p>

      </div>

      <!-- HUMIDITY -->
      <div
        class="bg-slate-900 p-6 rounded-2xl text-white shadow-lg">

        <h3 class="text-gray-400 text-lg">
          Humidity
        </h3>

        <p class="text-4xl font-bold mt-4">
          {{ weatherData.humidity }}%
        </p>

      </div>

      <!-- WIND -->
      <div
        class="bg-slate-900 p-6 rounded-2xl text-white shadow-lg">

        <h3 class="text-gray-400 text-lg">
          Wind Speed
        </h3>

        <p class="text-4xl font-bold mt-4">
          {{ weatherData.windSpeed }}
        </p>

      </div>

      <!-- CONDITION -->
      <div
        class="bg-slate-900 p-6 rounded-2xl text-white shadow-lg">

        <h3 class="text-gray-400 text-lg">
          Condition
        </h3>

        <p class="text-4xl font-bold mt-4">
          {{ weatherData.weatherCondition }}
        </p>

      </div>

    </div>

    <!-- EMPTY STATE -->
    <div
      *ngIf="!weatherData"
      class="text-center text-gray-400 mt-20">

      <h2 class="text-3xl font-bold">
        Search Any City 🌍
      </h2>

      <p class="mt-4 text-lg">
        Real-time weather dashboard
      </p>

    </div>

  </div>

</div>
