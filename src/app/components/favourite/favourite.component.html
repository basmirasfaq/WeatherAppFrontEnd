<div class="ml-64 min-h-screen bg-slate-950 p-8 text-white">

  <h1 class="text-3xl font-bold mb-6 text-blue-400">
    ⭐ Favourite Cities
  </h1>

  <div class="flex gap-4 mb-8">

    <input
      type="text"
      [(ngModel)]="city"
      placeholder="Enter city"
      class="px-4 py-3 rounded bg-slate-800 border border-slate-700 w-80 text-white">

    <button
      (click)="addFavourite()"
      class="bg-blue-500 px-6 py-3 rounded hover:bg-blue-600">

      Add

    </button>

  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    <div
      *ngFor="let item of favouriteCities; let i = index"
      class="bg-slate-900 p-6 rounded-xl shadow-lg border border-slate-800">

      <div class="flex justify-between items-center mb-4">

        <h2 class="text-2xl font-bold text-blue-300">
          {{ item.city }}
        </h2>

        <button
          (click)="removeFavourite(i)"
          class="text-red-400 text-xl">

          ✖

        </button>

      </div>

      <p class="text-5xl font-bold mb-3">
        {{ item.temperature }}°C
      </p>

      <p class="text-lg text-slate-300">
        {{ item.weatherCondition }}
      </p>

      <p class="mt-3 text-slate-300">
        💧 Humidity:
        {{ item.humidity }}%
      </p>

      <p class="text-slate-300">
        🌬 Wind:
        {{ item.windSpeed }} km/h
      </p>

    </div>

  </div>

</div>
