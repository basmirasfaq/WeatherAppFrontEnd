<div class="flex items-center gap-4">

  <input
    type="text"
    placeholder="Search city..."
    [(ngModel)]="city"
    class="bg-slate-800 p-3 rounded-xl outline-none text-white">

  <button
    (click)="searchWeather()"
    class="bg-blue-500 hover:bg-blue-600 px-5 py-3 rounded-xl transition">

    Search

  </button>

  <div
    class="w-12 h-12 rounded-full bg-blue-500 flex items-center justify-center">

    👤

  </div>

</div>
